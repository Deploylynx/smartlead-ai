<!DOCTYPE html>
<html>
<head>
    <title>SmartLead AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0b1b3a, #000814);
            color: white;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: gold;
            margin-left: 10px;
        }

        .container {
            padding: 30px;
        }

        input {
            padding: 12px;
            width: 350px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 12px 20px;
            background: gold;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            border-left: 3px solid gold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid gray;
        }

        .export {
            margin-top: 20px;
            display: inline-block;
            background: gold;
            padding: 10px;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div>🚀</div>
    <div class="logo">DeployLynx SmartLead AI</div>
</div>

<div class="container">

    <form method="POST">
        <input name="keyword" placeholder="Enter client requirement">
        <button type="submit">Find Leads</button>
    </form>

    {% if leads %}

    <a class="export" href="/export">⬇ Export CSV</a>

    <table>
        <tr>
            <th>Name</th>
            <th>Company</th>
            <th>Message</th>
        </tr>

        {% for lead in leads %}
        <tr>
            <td>{{ lead.name }}</td>
            <td>{{ lead.company }}</td>
            <td>{{ lead.message }}</td>
        </tr>
        {% endfor %}
    </table>

    {% endif %}

</div>

</body>
</html>
